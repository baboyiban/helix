# ~/.config/helix/languages.toml

# Go (assuming previous fixes applied)
[language-server.gopls]
command = "gopls"

[[language]]
name = "go"
scope = "source.go"
file-types = ["go"]
language-servers = ["gopls"]
formatter = { command = "goimports" }
auto-format = true
# If you want to configure a debugger for Go, you'd add it here, e.g.:
# [language.debugger]
# name = "dlv" # or whatever name you prefer for the dlv configuration
# transport = "stdio" # dlv usually uses stdio for DAP
# command = "dlv"
# args = ["dap"] # or specific args for dlv's DAP mode

# Rust
[[language]]
name = "rust"
scope = "source.rust"
file-types = ["rs"]
language-servers = ["rust-analyzer"]
formatter = { command = "rustfmt" }
auto-format = true

# Python
[[language]]
name = "python"
scope = "source.python"
file-types = ["py"]
language-servers = ["pyright"]
auto-format = true
formatter = { command = "black", args = ["--line-length", "88", "--quiet", "-"] } # <--- 이 라인 추가 또는 수정

[language.debugger]
name = "debugpy"
transport = "stdio"
command = "python3"
args = ["-m", "debugpy.adapter"]

[[language.debugger.templates]]
name = "Run file"
request = "launch"
completion = [ { name = "entrypoint", completion = "filename", default = "." } ]
args = { program = "{0}", console = "integratedTerminal" }

# 만약 전역 formatter가 python에만 사용되는 것이라면, 이 전역 [formatter] 블록은 삭제해도 좋습니다.
# [formatter]
# command = "black"
# args = ["--line-length", "88", "--quiet", "-"]

# Zig
[[language]]
name = "zig"
scope = "source.zig"
file-types = ["zig"]
language-servers = ["zls"]
formatter = { command = "zig", args = ["fmt", "--stdin"] }
auto-format = true

[language.debugger] # This is a specific debugger *for Zig*
name = "lldb-dap"
transport = "stdio" # <-- ADD THIS LINE
# PATH에 /opt/homebrew/opt/llvm/bin이 추가되었다면 아래 설정 사용
command = "lldb-dap"
# 확실하게 하려면 brew --prefix llvm으로 확인한 전체 경로 사용
# command = "/opt/homebrew/opt/llvm/bin/lldb-dap"

[[language.debugger.templates]]
name = "Run file"
request = "launch"
completion = [ { name = "file", kind = "file" } ]
args = { program = "{file}" }
